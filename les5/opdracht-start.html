<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <title>Vue 3 Task Manager (Vue 3)</title>
    <style>
      /* Algemene opmaak voor de body */
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #f4f4f4;
        color: #333;
      }

      /* Navigatie */
      nav {
        background-color: #fff;
        padding: 10px;
        border-bottom: 2px solid #ddd;
        margin-bottom: 20px;
        text-align: center;
      }

      /* Router-links */
      .router-link {
        margin: 0 15px;
        text-decoration: none;
        color: #555;
        font-size: 1.1em;
      }

      .router-link-active {
        font-weight: bold;
        color: #000;
      }

      /* Formulieren */
      form {
        background-color: #fff;
        padding: 15px;
        border: 1px solid #ddd;
        border-radius: 5px;
        max-width: 400px;
        margin: 0 auto 20px;
      }

      input[type="text"] {
        width: 100%;
        padding: 8px;
        margin: 8px 0;
        border: 1px solid #ccc;
        border-radius: 3px;
        box-sizing: border-box;
      }

      button {
        padding: 8px 15px;
        border: none;
        background-color: #007bff;
        color: #fff;
        border-radius: 3px;
        cursor: pointer;
        margin-top: 10px;
      }

      button:hover {
        background-color: #0056b3;
      }

      /* Lijst in het overzicht */
      ul {
        list-style-type: none;
        padding: 0;
        max-width: 600px;
        margin: 0 auto;
      }

      li {
        background-color: #fff;
        margin-bottom: 10px;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
        display: flex;
        align-items: center;
      }

      /* Informatie links in de li */
      .task-info {
        flex-grow: 1;
      }

      /* Groepering van de knoppen rechts */
      .button-group {
        display: flex;
        gap: 5px;
        margin-left: auto;
      }

      textarea {
        width: 200px;
        height: 150px;
        padding: 8px;
      }
    </style>
  </head>

  <body>
    <div id="app">
      <nav>
        <router-link class="router-link" to="/">Taak Invoer</router-link>

        <router-link class="router-link" to="/overview">Overzicht</router-link>
      </nav>

      <router-view></router-view>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4"></script>

    <script>
      // Taak Invoer component: voeg een nieuwe taak toe en sla deze op in localStorage
      const taskInput = {
        template: `
                      <div>
                      <h2>Taak Invoer</h2>
                      <form v-on:submit.prevent="addTask">
                          <label for="taskName">Taak:</label>
                          <input id="taskName" type="text" v-model="newTask.name">
                          <br>
                          <label for="taskDesc">Omschrijving:</label>
                          <input id="taskDesc" type="text" v-model="newTask.description">
                          <br>
                          <button type="submit">Toevoegen</button>
                      </form>
                      </div>
                  `,
        data() {
          return {
            tasks: [],
            newTask: {
              name: "",
              description: "",
            },
          };
        },
        methods: {
          addTask: function () {
            if (this.newTask.name != "" && this.newTask.description != "") {
              this.tasks.push({
                name: this.newTask.name,
                description: this.newTask.description,
                editing: false,
                tempData: null,
              });

              this.saveToLocalStorage();
              this.clearInputs();
              alert("Taak opgeslagen!");
            } else {
              alert("Vul alle velden in.");
            }
          },

          clearInputs: function () {
            this.newTask.name = "";
            this.newTask.description = "";
          },

          saveToLocalStorage: function () {
            localStorage.setItem("tasks", JSON.stringify(this.tasks));
          },
        },

        mounted() {
          if (localStorage.getItem("tasks")) {
            this.tasks = JSON.parse(localStorage.getItem("tasks"));
          }
        },
      };

      // Overzicht component: toon de taken, maak bewerken en verwijderen mogelijk
      const taskOverview = {
        template: `
                  <div>
                  <h2>Overzicht Taken</h2>
                  <ul>
                      <li v-for="(task, index) in tasks">
                          <div class="task-info">
                              <span v-if="!task.editing">{{task.name}} - {{task.description}} </span>

                              <div v-else>
                                  <input type="text" v-model="task.name">
                                  <textarea v-model="task.description"></textarea>
                              </div>
                          </div>
                          <div class="button-group">

                              <button v-if="!task.editing" v-on:click="editTask(index)">Bewerk</button>

                              <button v-if="task.editing" v-on:click="saveTask(index)">Opslaan</button>

                              <button v-if="task.editing" v-on:click="cancelTask(index)">Annuleer</button>

                              <button v-on:click="deleteTask(index)">Verwijder</button>
                          </div>
                      </li>
                  </ul>
                  </div>
                  `,
        data() {
          return {
            tasks: [],
            unsavedChanges: false,
          };
        },
        methods: {
          saveToLocalStorage: function () {
            localStorage.setItem("tasks", JSON.stringify(this.tasks));
          },
          deleteTask: function (index) {
            this.tasks.splice(index, 1);
            this.saveToLocalStorage();
            this.checkUnsaved();
          },
          editTask: function (index) {
            this.tasks[index].tempData = {
              name: this.tasks[index].name,
              description: this.tasks[index].description,
            };

            this.tasks[index].editing = true;
            this.checkUnsaved();
          },

          saveTask: function (index) {
            if (
              this.tasks[index].name != "" &&
              this.tasks[index].description != ""
            ) {
              this.tasks[index].editing = false;
              this.tasks[index].tempData = null;

              this.saveToLocalStorage();

              this.checkUnsaved();
            } else {
              alert("Vul alles in!");
            }
          },

          cancelTask: function (index) {
            this.tasks[index].name = this.tasks[index].tempData.name;
            this.tasks[index].description =
              this.tasks[index].tempData.description;

            this.tasks[index].editing = false;
            this.tasks[index].tempData = null;

            this.checkUnsaved();
          },

          checkUnsaved: function () {
            this.unsavedChanges = false;

            for (let i = 0; i < this.tasks.length; i++) {
              if (this.tasks[i].editing) {
                this.unsavedChanges = true;
                break;
              }
            }
          },
        },

        mounted() {
          if (localStorage.getItem("tasks")) {
            this.tasks = JSON.parse(localStorage.getItem("tasks"));
          }
        },

        beforeRouteLeave(to, from, next) {
          if (this.unsavedChanges == true) {
            let antwoord = confirm(
              "Je hebt nog wijzigingen. Verlaten zonder opslaan? ",
            );

            if (antwoord) {
              for (let i = 0; i < this.tasks.length; i++) {
                if (this.tasks[i].editing) {
                  if (this.tasks[i].tempData != null) {
                    this.tasks[i].name = this.tasks[i].tempData.name;
                    this.tasks[i].description =
                      this.tasks[i].tempData.description;
                  }
                  this.tasks[i].editing = false;
                  this.tasks[i].tempData = null;
                }
              }
              this.unsavedChanges = false;
              next();
            } else {
              next(false);
            }
          } else {
            next();
          }
        },
      };

      const router = VueRouter.createRouter({
        history: VueRouter.createWebHashHistory(),
        routes: [
          { path: "/", name: "TaskInput", component: taskInput },
          { path: "/overview", name: "TaskOverview", component: taskOverview },
        ],
      });

      const app = {
        data: function () {
          return {};
        },
      };

      Vue.createApp(app).use(router).mount("#app");
    </script>
  </body>
</html>
