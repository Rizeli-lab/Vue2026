<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <h2>Geef je naam in aub.</h2>
      <input v-model="naam" size="50" />
      <p>Hallo {{naam}}</p>
    </div>

    <script>
      const app = {
        data() {
          return { naam: "" };
        },
      };
      Vue.createApp(app).mount("#app");
    </script>
  </body>
</html>
