<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <div v-if="getal == 1 ">
    Toon deze tekst als het getal 1 is
</div>
<div v-else-if="getal == 2">
    Toon deze tekst als het getal 2 is
</div>
<div v-else>
    Toon deze tekst als het getal niet 1 of 2 is
</div>

    <script>
      const app = {
        data: function () {
          return { getal: 1 };
        },
      };
      Vue.createApp(app).mount("#app");
    </script>
  </body>
</html>
