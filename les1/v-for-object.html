<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <p v-for="(aantal, voertuig) in voertuigen">
        <!-- let op de volgorde: de value staat eerst, de key property als tweede -->
        Een {{ voertuig }} heeft {{aantal}} wielen
      </p>
    </div>
    <script>
      const app = {
        data: function () {
          return {
            voertuigen: {
              auto: 4,
              fiets: 2,
              step: 2,
              vrachtwagen: 6,
            },
          };
        },
      };
      Vue.createApp(app).mount("#app");
    </script>
  </body>
</html>
