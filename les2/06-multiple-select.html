<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <select v-model="multipleSelected" multiple>
        <option disabled value="">Selecteer aub.</option>
        <option value="optieA">A</option>
        <option value="optieB">B</option>
        <option value="optieC">C</option>
      </select>
      <br />
      <span>Selected: {{ multipleSelected }}</span>
    </div>
    <script>
      const app = {
        data: function () {
          return { multipleSelected: [] };
        },
      };
      Vue.createApp(app).mount("#app");
    </script>
  </body>
</html>
