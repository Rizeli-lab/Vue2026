<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Webshop</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
      .button {
        padding: 10px 20px;
        border: none;
        cursor: pointer;
        border-radius: 5px;
        color: grey;
        font-size: 16px;
      }

      .product-container {
        display: flex;
        gap: 20px;
      }

      .product {
        display: inline-block;
        margin: 20px;
        text-align: center;
        width: 300px;
        height: 300px;
        background-color: lightgray;
      }

      .product img {
        margin: 0 auto;
        margin-bottom: 10px;
      }

      .notification {
        position: fixed;
        top: 10px;
        right: 220px;
        padding: 10px;
        border-radius: 5px;
        color: white;
      }

      .success {
        background-color: green;
      }

      .warning {
        background-color: orange;
      }

      div.cart-indicator-container {
        position: fixed;
        top: 10px;
        right: 10px;
        padding: 10px;
        background: green;
        color: white;
        width: 180px;
        text-align: right;
      }

      ul.cart-indicator-list {
        display: none;
        position: absolute;
        top: 20px;
        right: 0;
        background: green;
        padding: 0px;
        list-style-type: none;
        width: 180px;
        text-align: right;
      }

      div.cart-indicator-container:hover ul.cart-indicator-list {
        display: block;
      }

      ul.cart-indicator-list li {
        margin: 15px 0;
        padding-bottom: 15px;
        padding-right: 10px;
        color: white;
      }
    </style>
  </head>

  <body>
    <div id="app">
      <product-container v-bind:product="products[0]"> </product-container>
    </div>
  </body>

  <script type="text/x-template" id="product-container-template">
    <div class="product">
        <img v-bind:src="product.image" v-bind:alt="product.name">
        <h3>{{product.name}}</h3>
        <button class="button">Toevoegen</button>
    </div>
  </script>

  <script>
    const app = Vue.createApp({
      data: function () {
        return {
          products: [
            { id: 1, name: "Hondenpak superman", image: "images/small-1.jpg" },
            { id: 2, name: "Wonder woman", image: "images/small-2.jpg" },
            { id: 3, name: "Spiderman masker", image: "images/small-3.jpg" },
          ],
          cartItems: [],
          notification: {
            message: "",
            type: "",
          },
        };
      },
    });
    app.component("product-container", {
      props: ["product"],
      template: "#product-container-template",
    });

    app.mount("#app");
  </script>
</html>
