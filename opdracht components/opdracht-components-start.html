<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Webshop</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
      .button {
        padding: 10px 20px;
        border: none;
        cursor: pointer;
        border-radius: 5px;
        color: grey;
        font-size: 16px;
      }

      .product-container {
        display: flex;
        gap: 20px;
      }

      .product {
        display: inline-block;
        margin: 20px;
        text-align: center;
        width: 300px;
        height: 300px;
        background-color: lightgray;
      }

      .product img {
        margin: 0 auto;
        margin-bottom: 10px;
      }

      .notification {
        position: fixed;
        top: 10px;
        right: 220px;
        padding: 10px;
        border-radius: 5px;
        color: white;
      }

      .success {
        background-color: green;
      }

      .warning {
        background-color: orange;
      }

      div.cart-indicator-container {
        position: fixed;
        top: 10px;
        right: 10px;
        padding: 10px;
        background: green;
        color: white;
        width: 180px;
        text-align: right;
      }

      ul.cart-indicator-list {
        display: none;
        position: absolute;
        top: 40px;
        right: 0;
        background: green;
        padding: 0px;
        list-style-type: none;
        width: 180px;
        text-align: right;
      }

      div.cart-indicator-container:hover ul.cart-indicator-list {
        display: block;
      }

      ul.cart-indicator-list li {
        margin: 15px 0;
        padding-bottom: 15px;
        padding-right: 10px;
        color: white;
      }
    </style>
  </head>

  <body>
    <div id="app">
      <notification
        v-if="notification.message !=''"
        v-bind:message="notification.message"
        v-bind:type="notification.type"
      >
      </notification>

      <cart-indicator v-bind:items="cartItems" v-on:remove-item="removeItem">
      </cart-indicator>

      <div class="product-container">
        <product-container
          v-for="product in products"
          v-bind:key="product.id"
          v-bind:product="product"
          v-on:add-product="addProduct"
        >
        </product-container>
      </div>
    </div>
  </body>

  <script type="text/x-template" id="product-container-template">
    <div class="product">
        <img v-bind:src="product.image" v-bind:alt="product.name">
        <h3>{{product.name}}</h3>
        <button class="button" v-on:click="$emit('add-product', product)">Toevoegen</button>
    </div>
  </script>

  <script type="text/x-template" id="cart-indicator-template">
    <div class="cart-indicator-container">
      <p>Winkelwagen: {{items.length}}</p>
      <ul class="cart-indicator-list">
        <li v-for="item in items" v-bind:key="item.id"> {{item.name}} <button v-on:click="$emit('remove-item', item.id)">x</button></li>
      </ul>
    </div>
  </script>

  <script type="text/x-template" id="notification-template">
    <div class="notification" v-bind:class="type">{{message}}</div>
  </script>

  <script>
    const app = Vue.createApp({
      data: function () {
        return {
          products: [
            { id: 1, name: "Hondenpak superman", image: "images/small-1.jpg" },
            { id: 2, name: "Wonder woman", image: "images/small-2.jpg" },
            { id: 3, name: "Spiderman masker", image: "images/small-3.jpg" },
          ],
          cartItems: [],
          notification: {
            message: "",
            type: "",
          },
        };
      },
      methods: {
        addProduct: function (product) {
          this.cartItems.push(product);
          localStorage.setItem("cart", JSON.stringify(this.cartItems));
          this.showNotification("Product toegevoegd!", "success");
        },

        removeItem: function (id) {
          this.cartItems = this.cartItems.filter(function (item) {
            return item.id != id;
          });
          localStorage.setItem("cart", JSON.stringify(this.cartItems));
        },

        showNotification: function (message, type) {
          this.notification.message = message;
          this.notification.type = type;

          setTimeout(() => {
            this.notification.message = "";
            this.notification.type = "";
          }, 3000);
        },
      },
      mounted() {
        let opgeslagen = localStorage.getItem("cart");

        if (opgeslagen) {
          this.cartItems = JSON.parse(opgeslagen);
          this.showNotification("Vorige bestelling hersteld!", "warning");
        }
      },
    });

    app.component("product-container", {
      props: ["product"],
      template: "#product-container-template",
    });

    app.component("cart-indicator", {
      props: ["items"],
      template: "#cart-indicator-template",
    });

    app.component("notification", {
      props: ["message", "type"],
      template: "#notification-template",
    });

    app.mount("#app");
  </script>
</html>
